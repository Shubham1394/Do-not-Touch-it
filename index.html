<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Priyanka</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        #message-box {
            opacity: 0;
            transform: scale(0.5);
            transition: all 1.5s ease-in-out;
            z-index: 10;
            padding: 20px;
        }
        h1 {
            font-size: 2.5rem;
            color: #ff4d6d;
            text-shadow: 0 0 20px rgba(255, 77, 109, 0.6);
            margin-bottom: 10px;
        }
        p {
            font-size: 1.8rem;
            color: #fff;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        /* Tap to open button */
        #start-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #ff4d6d;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 77, 109, 0.5);
            transition: 0.3s;
            z-index: 20;
        }
        #start-btn:hover {
            transform: scale(1.05);
            background: #ff758f;
        }
    </style>
</head>
<body>
 
    <button id="start-btn" onclick="revealLove()">Open Message ❤️</button>
 
    <div id="message-box">
        <h1>I love you Priyanka</h1>
        <p>I love you so much</p>
    </div>
 
    <canvas id="heartCanvas"></canvas>
 
    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
 
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();
 
        class HeartParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 15 + 10;
                // Blast vector physics
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 4;
                this.speedX = Math.cos(angle) * speed;
                this.speedY = Math.sin(angle) * speed;
                this.gravity = 0.05;
                this.opacity = 1;
                this.fade = Math.random() * 0.015 + 0.01;
            }
 
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += this.gravity; // slightly pull down over time
                this.opacity -= this.fade;
            }
 
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#ff4d6d';
                ctx.translate(this.x, this.y);
                
                // Drawing a heart shape
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-this.size/2, -this.size/2, -this.size, +this.size/3, 0, this.size);
                ctx.bezierCurveTo(this.size, +this.size/3, this.size/2, -this.size/2, 0, 0);
                ctx.fill();
                ctx.restore();
            }
        }
 
        function createBlast() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            // Spawn 100 hearts instantly for the explosion
            for (let i = 0; i < 100; i++) {
                particles.push(new HeartParticle(centerX, centerY));
            }
        }
 
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.update();
                p.draw();
                if (p.opacity <= 0) particles.splice(index, 1);
            });
            requestAnimationFrame(animate);
        }
 
        function revealLove() {
            // Hide button
            document.getElementById('start-btn').style.display = 'none';
            
            // Show text animation
            const msg = document.getElementById('message-box');
            msg.style.opacity = '1';
            msg.style.transform = 'scale(1)';
            
            // Start heart blast
            createBlast();
            animate();
            
            // Create a small extra burst every second
            setInterval(() => {
                if(particles.length < 50) {
                     createBlast();
                }
            }, 1200);
        }
    </script>
</body>
</html>
