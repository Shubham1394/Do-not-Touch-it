<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Priyanka</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        
        /* The Message Box Animation */
        #message-box {
            opacity: 0;
            transform: scale(0.3) translateY(50px); /* Starts small and slightly lower */
            transition: all 2s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Smooth, elegant pop-in effect */
            z-index: 10;
            padding: 30px;
            max-width: 90%;
        }
        
        h1 {
            font-size: 2.8rem;
            color: #ff4d6d;
            text-shadow: 0 0 20px rgba(255, 77, 109, 0.6);
            margin-bottom: 15px;
        }
        
        .main-love {
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 25px;
        }
 
        /* Styling for your additional messages */
        .extra-message {
            font-size: 1.2rem;
            color: #ffb3c1;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1.5s ease-in-out;
            margin-top: 10px;
            line-height: 1.6;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #start-btn {
            padding: 15px 35px;
            font-size: 1.3rem;
            background: #ff4d6d;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.5);
            transition: 0.3s;
            z-index: 20;
        }
        
        #start-btn:hover {
            transform: scale(1.05);
            background: #ff758f;
        }
    </style>
</head>
<body>
 
    <button id="start-btn" onclick="revealLove()">Open Message ❤️</button>
 
    <div id="message-box">
        <h1>Hey, how is it? Hope you loved it</h1>
        <p class="main-love">I miss you so much. Jyada kachu na bola moye, bs itno kehno hai ki tu achi lagtey moye thik hai, ab jyada bhaav mat khaiyo.</p>
        
        <!-- EDIT YOUR ADDITIONAL MESSAGES HERE -->
        <p class="extra-message" id="extra1">Ham chalengey ghumney kahin dur. Mmmmuuuuaaaaaahhhhhhhhhhhhh meri jaan. ✨</p>
        <p class="extra-message" id="extra2">Tonnes of Love for You Pagal Ladki. ❤️</p>
    </div>
 
    <canvas id="heartCanvas"></canvas>
 
    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
 
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();
 
        class HeartParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 15 + 10;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 10 + 5; /* Slightly faster blast */
                this.speedX = Math.cos(angle) * speed;
                this.speedY = Math.sin(angle) * speed;
                this.gravity = 0.04;
                this.opacity = 1;
                this.fade = Math.random() * 0.012 + 0.008;
            }
 
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += this.gravity;
                this.opacity -= this.fade;
            }
 
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#ff4d6d';
                ctx.translate(this.x, this.y);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-this.size/2, -this.size/2, -this.size, +this.size/3, 0, this.size);
                ctx.bezierCurveTo(this.size, +this.size/3, this.size/2, -this.size/2, 0, 0);
                ctx.fill();
                ctx.restore();
            }
        }
 
        function createBlast() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            for (let i = 0; i < 120; i++) { /* 120 hearts for a bigger blast */
                particles.push(new HeartParticle(centerX, centerY));
            }
        }
 
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.update();
                p.draw();
                if (p.opacity <= 0) particles.splice(index, 1);
            });
            requestAnimationFrame(animate);
        }
 
        function revealLove() {
            document.getElementById('start-btn').style.display = 'none';
            
            // Trigger the text fade-in zoom animation
            const msg = document.getElementById('message-box');
            msg.style.opacity = '1';
            msg.style.transform = 'scale(1) translateY(0)';
            
            createBlast();
            animate();
            
            // Fade in the first extra message after 1.5 seconds
            setTimeout(() => {
                const ex1 = document.getElementById('extra1');
                ex1.style.opacity = '1';
                ex1.style.transform = 'translateY(0)';
            }, 1500);
 
            // Fade in the second extra message after 3 seconds
            setTimeout(() => {
                const ex2 = document.getElementById('extra2');
                ex2.style.opacity = '1';
                ex2.style.transform = 'translateY(0)';
            }, 3000);
            
            setInterval(() => {
                if(particles.length < 40) {
                     createBlast();
                }
            }, 1500);
        }
    </script>
</body>
</html>
